name: SVF-OCaml CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      # -------------------------------------------------------
      # 1. Checkout
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # 2. System dependencies
      # -------------------------------------------------------
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl build-essential cmake g++ \
            nodejs npm \
            libncurses5-dev libtinfo6 libzstd-dev \
            libffi-dev zlib1g-dev \
            pkg-config \
            llvm-18-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake node llvm@18 z3 pkg-config

      # -------------------------------------------------------
      # 3. Install OCaml via opam
      # -------------------------------------------------------
      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install OCaml dependencies
        run: |
          opam install -y dune alcotest

      # -------------------------------------------------------
      # 4. Install SVF libraries (via npm svf-lib)
      # -------------------------------------------------------
      - name: Install SVF libraries (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          npm install -g svf-lib
          SVF_LIB_DIR=$(npm root -g)/svf-lib
          arch=$(uname -m)
          LLVM_BUNDLED="${SVF_LIB_DIR}/llvm-18.1.0.obj"
          # The bundled LLVM omits headers; symlink them from system llvm-18-dev
          mkdir -p "${LLVM_BUNDLED}/include"
          ln -sfn /usr/lib/llvm-18/include/llvm   "${LLVM_BUNDLED}/include/llvm"
          ln -sfn /usr/lib/llvm-18/include/llvm-c "${LLVM_BUNDLED}/include/llvm-c"
          echo "SVF_DIR=${SVF_LIB_DIR}/SVF-linux-${arch}" >> $GITHUB_ENV
          echo "LLVM_DIR=${LLVM_BUNDLED}"                  >> $GITHUB_ENV
          echo "Z3_DIR=${SVF_LIB_DIR}/z3.obj"              >> $GITHUB_ENV
          echo "CXX_LINK_FLAGS=-lstdc++"                   >> $GITHUB_ENV

      - name: Install SVF libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          npm install -g svf-lib
          SVF_LIB_DIR=$(npm root -g)/svf-lib
          echo "SVF_DIR=${SVF_LIB_DIR}/SVF-osx"       >> $GITHUB_ENV
          echo "LLVM_DIR=$(brew --prefix llvm@18)"     >> $GITHUB_ENV
          echo "Z3_DIR=$(brew --prefix z3)"            >> $GITHUB_ENV
          echo "CXX_LINK_FLAGS=-lc++"                  >> $GITHUB_ENV

      # -------------------------------------------------------
      # 5. Build
      # -------------------------------------------------------
      - name: Build SVF-OCaml library
        run: |
          eval $(opam env)
          SVF_DIR=$SVF_DIR LLVM_DIR=$LLVM_DIR Z3_DIR=$Z3_DIR CXX_LINK_FLAGS=$CXX_LINK_FLAGS \
            dune build

      # -------------------------------------------------------
      # 6. Run tests
      # -------------------------------------------------------
      - name: Run test cases (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          eval $(opam env)
          export LD_LIBRARY_PATH="$SVF_DIR/lib:$LLVM_DIR/lib:$Z3_DIR/lib:$LD_LIBRARY_PATH"
          cd test_cases
          SVF_DIR=$SVF_DIR LLVM_DIR=$LLVM_DIR Z3_DIR=$Z3_DIR CXX_LINK_FLAGS=$CXX_LINK_FLAGS \
            dune exec ./test.exe
          SVF_DIR=$SVF_DIR LLVM_DIR=$LLVM_DIR Z3_DIR=$Z3_DIR CXX_LINK_FLAGS=$CXX_LINK_FLAGS \
            dune exec ./test2.exe

      - name: Run test cases (macOS)
        if: runner.os == 'macOS'
        run: |
          eval $(opam env)
          export DYLD_LIBRARY_PATH="$SVF_DIR/lib:$LLVM_DIR/lib:$Z3_DIR/lib:$DYLD_LIBRARY_PATH"
          cd test_cases
          SVF_DIR=$SVF_DIR LLVM_DIR=$LLVM_DIR Z3_DIR=$Z3_DIR CXX_LINK_FLAGS=$CXX_LINK_FLAGS \
            dune exec ./test.exe
          SVF_DIR=$SVF_DIR LLVM_DIR=$LLVM_DIR Z3_DIR=$Z3_DIR CXX_LINK_FLAGS=$CXX_LINK_FLAGS \
            dune exec ./test2.exe

      # -------------------------------------------------------
      # 7. Report
      # -------------------------------------------------------
      - name: Verify build artifacts
        run: |
          eval $(opam env)
          if [ -f _build/default/lib/svf_ocaml.cma ] || \
             [ -f _build/default/lib/svf_ocaml.cmxa ]; then
            echo "Library built successfully."
          else
            echo "Library not found in _build/."
            exit 1
          fi
